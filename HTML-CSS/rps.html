<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9fafb 0%, #e2e8f0 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #111827;
    }

    .container {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 28px;
      background: white;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      color: #0f172a;
    }

    p {
      margin: 0 0 24px;
      color: #475569;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .scorecard {
      padding: 18px 14px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .scorecard strong {
      display: block;
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 8px;
    }

    .scorecard span {
      font-size: 1.4rem;
      color: #111827;
      font-weight: 700;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .choice-button {
      min-width: 110px;
      padding: 16px 18px;
      border-radius: 18px;
      border: none;
      background: #0ea5e9;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(14, 165, 233, 0.2);
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .choice-button:hover {
      background: #0284c7;
      transform: translateY(-1px);
    }

    .result-box {
      padding: 22px 18px;
      border-radius: 22px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .result-box h2 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    .result-box p {
      margin: 6px 0;
      font-size: 1rem;
      color: #334155;
    }

    .result-text {
      margin-top: 14px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .reset-button {
      margin-top: 20px;
      padding: 14px 18px;
      border: none;
      border-radius: 18px;
      background: #9333ea;
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    .reset-button:hover {
      background: #7c3aed;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rock Paper Scissors</h1>
    <p>Pick your move and challenge the computer. First to win 5 rounds is the champion!</p>

    <div class="scoreboard">
      <div class="scorecard">
        <strong>Your Score</strong>
        <span id="playerScore">0</span>
      </div>
      <div class="scorecard">
        <strong>Draws</strong>
        <span id="drawScore">0</span>
      </div>
      <div class="scorecard">
        <strong>Computer Score</strong>
        <span id="computerScore">0</span>
      </div>
    </div>

    <div class="choices">
      <button class="choice-button" data-choice="rock">Rock 🪨</button>
      <button class="choice-button" data-choice="paper">Paper 📄</button>
      <button class="choice-button" data-choice="scissors">Scissors ✂️</button>
    </div>

    <div class="result-box">
      <h2>Round Result</h2>
      <p id="playerMove">Your move: -</p>
      <p id="computerMove">Computer move: -</p>
      <p class="result-text" id="resultText">Choose Rock, Paper, or Scissors to start!</p>
    </div>

    <button class="reset-button" id="resetBtn">Reset Game</button>
  </div>

  <script>
    const choices = ['rock', 'paper', 'scissors'];
    const buttons = document.querySelectorAll('.choice-button');
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');
    const drawScoreEl = document.getElementById('drawScore');
    const playerMoveEl = document.getElementById('playerMove');
    const computerMoveEl = document.getElementById('computerMove');
    const resultTextEl = document.getElementById('resultText');
    const resetBtn = document.getElementById('resetBtn');

    let playerScore = 0;
    let computerScore = 0;
    let drawScore = 0;

    function getComputerChoice() {
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function getRoundResult(playerChoice, computerChoice) {
      if (playerChoice === computerChoice) {
        return 'draw';
      }

      if (
        (playerChoice === 'rock' && computerChoice === 'scissors') ||
        (playerChoice === 'paper' && computerChoice === 'rock') ||
        (playerChoice === 'scissors' && computerChoice === 'paper')
      ) {
        return 'player';
      }

      return 'computer';
    }

    function updateScores(result) {
      if (result === 'player') playerScore += 1;
      if (result === 'computer') computerScore += 1;
      if (result === 'draw') drawScore += 1;

      playerScoreEl.textContent = playerScore;
      computerScoreEl.textContent = computerScore;
      drawScoreEl.textContent = drawScore;
    }

    function updateResultText(result, playerChoice, computerChoice) {
      playerMoveEl.textContent = `Your move: ${playerChoice}`;
      computerMoveEl.textContent = `Computer move: ${computerChoice}`;

      if (result === 'player') {
        resultTextEl.textContent = 'You win this round! 🎉';
      } else if (result === 'computer') {
        resultTextEl.textContent = 'Computer wins this round! 🤖';
      } else {
        resultTextEl.textContent = 'It’s a draw! Try again.';
      }
    }

    function checkGameOver() {
      if (playerScore >= 5 || computerScore >= 5) {
        const winner = playerScore > computerScore ? 'You win the game! 🏆' : 'Computer wins the game! 💻';
        resultTextEl.textContent = winner;
        buttons.forEach(button => button.disabled = true);
      }
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        if (playerScore >= 5 || computerScore >= 5) return;

        const playerChoice = button.dataset.choice;
        const computerChoice = getComputerChoice();
        const result = getRoundResult(playerChoice, computerChoice);

        updateScores(result);
        updateResultText(result, playerChoice, computerChoice);
        checkGameOver();
      });
    });

    resetBtn.addEventListener('click', () => {
      playerScore = 0;
      computerScore = 0;
      drawScore = 0;
      playerScoreEl.textContent = 0;
      computerScoreEl.textContent = 0;
      drawScoreEl.textContent = 0;
      playerMoveEl.textContent = 'Your move: -';
      computerMoveEl.textContent = 'Computer move: -';
      resultTextEl.textContent = 'Choose Rock, Paper, or Scissors to start!';
      buttons.forEach(button => button.disabled = false);
    });
  </script>
</body>
</html>
