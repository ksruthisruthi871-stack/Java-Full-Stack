<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
   <h1>Driving License</h1>  
   <form id="details">
    <label>Name:</label>
    <input type="text" id="name" required><br><br>
    <label>Email:</label>
    <input type="email" id="mail" required><br><br>
    <label>Phone no:</label>
    <input type="number" id="phone" required><br><br>
    <label>DOB:</label>
    <input type="date" id="dob" required><br><br>
    <label>Color:</label>
    <input type="color"><br><br>
    <label>Age:</label>
    <input type="number" id="age" required><br><br>
    <label>Gender:</label>
    <input type="radio" name="gender" id="male" value="Male" required>Male
    <input type="radio" name="gender" id="female" value="Female">Female
    <br><br>
    <label>Verified</label>
    <input type="checkbox" name="documents" value="RC book">RC
    <input type="checkbox" name="documents" value="Insurance">Insurance
    <input type="checkbox" name="documents" value="Pollution control">Pollution Control
    <br><br>
    <label>Address:</label>
    <input type="text" id="address" required><br><br>
    <label>Photo:</label>
    <input type="file" id="image" accept="image/*" required><br><br>
    <button type="submit">Submit</button>
   </form>
   <h2>License Details</h2>
   <p id="p1"></p>
   <p id="p2"></p>
   <p id="p3"></p>
   <p id="p4"></p>
   <p id="p5"></p>
   <p id="p6"></p>
   <p id="p7"></p>
   <p id="p8"></p>
   <img id="dp" width="200px">
   <script src="form.js"></script>
</body>
</html>
