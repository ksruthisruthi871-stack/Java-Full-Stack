<!DOCTYPE html>
<html>
<head>
  <title>Purple Place</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: purple;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h1 {
      margin-top: 50px;
      font-size: 50px;
      text-shadow: 2px 2px 5px black;
    }
    .box {
      width: 200px;
      height: 200px;
      background: violet;
      margin: 50px auto;
      border-radius: 20px;
      box-shadow: 0 0 20px white;
    }
    p {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <h1>🌌 Welcome to Purple Place</h1>
  <div class="box"></div>
  <p>This is your magical purple-themed world!</p>
</body>
</html>
