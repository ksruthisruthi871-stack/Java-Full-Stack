<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chicken Pizza Prep — Foodie Game</title>
  <style>
    :root{
      --bg:#fff7ed;
      --panel:#fff;
      --accent:#f97316;
      --muted:#64748b;
      --btn:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Inter,Segoe UI,system-ui,Arial;
      background:linear-gradient(180deg,var(--bg),#fff1f2);
      color:#0f172a;
      padding:24px;
    }
    .shell{width:min(920px,100%);display:grid;grid-template-columns:360px 1fr;gap:20px}
    .panel{background:var(--panel);border-radius:18px;padding:18px;box-shadow:0 12px 40px rgba(15,23,42,0.08)}
    .title{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .title h1{font-size:1.4rem;margin:0;color:var(--accent)}
    .meta{color:var(--muted);font-size:0.95rem}
    .scoreboard{display:flex;gap:10px;margin-top:12px}
    .score{flex:1;padding:10px;border-radius:12px;background:linear-gradient(180deg,#fff,#fffaf0);text-align:center}
    .score strong{display:block;color:var(--muted);font-size:0.85rem}
    .score span{font-size:1.4rem;font-weight:800;color:#111827}
    .kitchen{display:flex;flex-direction:column;gap:16px}
    .ingredients{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .ing{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:linear-gradient(180deg,#fff,#fffaf0);cursor:pointer;border:1px solid rgba(0,0,0,0.04);user-select:none}
    .ing span{font-size:1.35rem}
    .ing p{margin:0;font-weight:700}
    .ing small{display:block;color:var(--muted);font-weight:500}
    .controls{display:flex;gap:10px;margin-top:12px}
    button{padding:10px 14px;border-radius:12px;border:none;cursor:pointer;font-weight:700}
    .btn-start{background:linear-gradient(90deg,#fb923c,#fb7185);color:white}
    .btn-reset{background:#e2e8f0}

    /* Arena (pizza area) */
    .arena-wrap{display:flex;flex-direction:column;gap:12px}
    .arena{height:560px;border-radius:18px;background:linear-gradient(180deg,#fff8f0,#fff1e6);border:4px solid #fee2e2;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .pizza{
      width:360px;height:360px;border-radius:50%;background:conic-gradient(#fef3c7 0deg,#fde68a 200deg,#fdd8b8 360deg);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:inset 0 8px 18px rgba(0,0,0,0.05)
    }
    .pizza::after{content:'';position:absolute;inset:18px;border-radius:50%;background:linear-gradient(180deg,#fff7ed,rgba(255,255,255,0.02))}
    .topping{position:absolute;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;pointer-events:none;transform:translate(-50%,-50%);}
    .topping.chicken{background:rgba(255,246,230,0.9)}
    .topping.cheese{background:rgba(255,250,230,0.9)}
    .topping.sauce{background:rgba(255,235,230,0.95)}
    .topping.herb{background:rgba(230,255,240,0.9)}

    .progress{height:10px;background:#ffe4e6;border-radius:999px;overflow:hidden;margin-top:8px}
    .bar{height:100%;background:linear-gradient(90deg,#fb7185,#fb923c);width:0%}

    .log{margin-top:12px;font-size:0.95rem;color:var(--muted)}

    @media (max-width:900px){.shell{grid-template-columns:1fr;}.arena{height:420px}.pizza{width:320px;height:320px}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel kitchen">
      <div class="title"><h1>Chicken Pizza Prep</h1><div class="meta">Make the perfect chicken pizza!</div></div>
      <div class="scoreboard">
        <div class="score"><strong>Score</strong><span id="score">0</span></div>
        <div class="score"><strong>Level</strong><span id="level">1</span></div>
        <div class="score"><strong>Misses</strong><span id="misses">0</span></div>
      </div>

      <div style="margin-top:12px;font-weight:700;color:var(--muted)">Ingredients</div>
      <div class="ingredients" id="ingredients">
        <div class="ing" data-ing="dough"><span>🍞</span><div><p>Dough</p><small>Start</small></div></div>
        <div class="ing" data-ing="sauce"><span>🍅</span><div><p>Tomato Sauce</p><small>Spread</small></div></div>
        <div class="ing" data-ing="cheese"><span>🧀</span><div><p>Cheese</p><small>Melt</small></div></div>
        <div class="ing" data-ing="chicken"><span>🍗</span><div><p>Chicken</p><small>Cooked</small></div></div>
        <div class="ing" data-ing="herb"><span>🌿</span><div><p>Herbs</p><small>Garnish</small></div></div>
        <div class="ing" data-ing="chili"><span>🌶️</span><div><p>Chili</p><small>Avoid</small></div></div>
      </div>

      <div class="controls">
        <button class="btn-start" id="startBtn">Start Game</button>
        <button class="btn-reset" id="resetBtn">Reset</button>
      </div>

      <div class="log" id="log">Order: Dough → Sauce → Cheese → Chicken → Herbs. Avoid chili peppers!</div>
    </aside>

    <main class="panel arena-wrap">
      <div class="arena">
        <div class="pizza" id="pizza" aria-label="Pizza">
          <!-- toppings will be placed here -->
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px">
        <div style="flex:1">
          <div style="font-weight:700;color:var(--muted)">Progress</div>
          <div class="progress"><div class="bar" id="bar"></div></div>
        </div>
        <div style="width:160px;text-align:right;color:var(--muted)">Time: <span id="time">60</span>s</div>
      </div>

    </main>
  </div>

  <script>
    // Game rules: correct order: dough -> sauce -> cheese -> chicken -> herb
    const order = ['dough','sauce','cheese','chicken','herb'];
    let placed = [];
    let score = 0;
    let misses = 0;
    let level = 1;
    let timeLeft = 60;
    let running = false;
    let timerId = null;

    const pizza = document.getElementById('pizza');
    const ingredientsEl = document.getElementById('ingredients');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const missesEl = document.getElementById('misses');
    const logEl = document.getElementById('log');
    const bar = document.getElementById('bar');
    const timeEl = document.getElementById('time');

    function randPos(){
      // random position within pizza
      const r = 120 * Math.sqrt(Math.random());
      const angle = Math.random()*Math.PI*2;
      const cx = 180; const cy = 180; // pizza center
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);
      return {x,y};
    }

    function placeTopping(type,emoji){
      const pos = randPos();
      const node = document.createElement('div');
      node.className = 'topping ' + (type==='chicken'?'chicken':type==='cheese'?'cheese':type==='sauce'?'sauce':type==='herb'?'herb':'');
      node.style.left = pos.x + 'px';
      node.style.top = pos.y + 'px';
      node.textContent = emoji;
      pizza.appendChild(node);
      // animate scale
      node.animate([{transform:'scale(0)'},{transform:'scale(1)'}],{duration:220,easing:'ease-out'});
    }

    function updateHUD(){
      scoreEl.textContent = score;
      missesEl.textContent = misses;
      levelEl.textContent = level;
      bar.style.width = Math.min(100,(placed.length/order.length*100)) + '%';
    }

    function resetGame(){
      placed = [];
      score = 0; misses = 0; level = 1; timeLeft = 60; running = false;
      clearInterval(timerId); timerId = null;
      pizza.querySelectorAll('.topping').forEach(n=>n.remove());
      updateHUD(); timeEl.textContent = timeLeft; bar.style.width = '0%'; logEl.textContent = 'Order: Dough → Sauce → Cheese → Chicken → Herbs. Avoid chili peppers!';
      startBtn.disabled = false;
    }

    function startTimer(){
      if(timerId) clearInterval(timerId);
      timerId = setInterval(()=>{
        timeLeft -=1;
        timeEl.textContent = timeLeft;
        if(timeLeft<=0){
          endGame('Time up!');
        }
      },1000);
    }

    function startGame(){
      resetGame();
      running = true;
      startBtn.disabled = true;
      logEl.textContent = 'Make pizzas by selecting ingredients in order. Avoid chilis!';
      startTimer();
      // spawn a random extra chili occasionally (visual only)
    }

    function endGame(msg){
      running = false;
      clearInterval(timerId); timerId = null;
      alert(msg + ' Final score: ' + score);
      startBtn.disabled = false;
    }

    ingredientsEl.addEventListener('click', (e)=>{
      const ing = e.target.closest('.ing');
      if(!ing||!running) return;
      const type = ing.dataset.ing;
      handleIngredient(type);
    });

    function handleIngredient(type){
      // chili is a trap: loses a life/miss
      if(type==='chili'){
        misses +=1; score = Math.max(0,score-5);
        logEl.textContent = 'Ouch! Chili is too spicy — that was a mistake.';
        updateHUD();
        if(misses>=3) endGame('Too many mistakes!');
        return;
      }

      const nextNeeded = order[placed.length];
      if(type===nextNeeded){
        // correct
        placed.push(type);
        // place emoji
        const emoji = type==='dough'?'🍞':type==='sauce'?'🍅':type==='cheese'?'🧀':type==='chicken'?'🍗':'🌿';
        placeTopping(type,emoji);
        score += 10;
        logEl.textContent = 'Nice! Added ' + type + '.';
        if(placed.length===order.length){
          // completed pizza
          score += 30; // bonus
          logEl.textContent = 'Pizza Complete! You finished a chicken pizza.';
          // small celebration
          confetti();
          // reset pizza for next round after short delay
          setTimeout(()=>{
            pizza.querySelectorAll('.topping').forEach(n=>n.remove());
            placed = [];
            level += 1;
            timeLeft += 12; // extra time
            updateHUD();
          },700);
        }
      } else {
        // wrong ingredient
        misses +=1; score = Math.max(0,score-3);
        logEl.textContent = `Wrong ingredient. Expected ${nextNeeded || '—'}.`;
        if(misses>=3){ endGame('Too many mistakes!'); }
      }
      updateHUD();
    }

    function confetti(){
      // simple confetti dots
      for(let i=0;i<30;i++){
        const d=document.createElement('div');
        d.style.position='absolute';
        d.style.left=(50+Math.random()*260)+'%';
        d.style.top=(20+Math.random()*60)+'%';
        d.style.width='8px';d.style.height='8px';d.style.borderRadius='2px';
        const colors=['#fb7185','#f97316','#f59e0b','#34d399','#60a5fa'];
        d.style.background=colors[Math.floor(Math.random()*colors.length)];
        d.style.opacity='0.95';
        document.body.appendChild(d);
        d.animate([{transform:'translateY(0) rotate(0)'},{transform:'translateY(160px) rotate(720deg)',opacity:0}],{duration:900+Math.random()*800,easing:'cubic-bezier(.2,.8,.2,1)'});
        setTimeout(()=>d.remove(),1800);
      }
    }

    startBtn.addEventListener('click', ()=>startGame());
    resetBtn.addEventListener('click', ()=>resetGame());

    // initialize
    resetGame();

  </script>
</body>
</html>
